<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Views On AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="content">

    <!-- Hero Header from https://www.sliderrevolution.com/resources/css-header/ -->

    <header class="column-xs main-xs-between cross-xs-center full-image-wrap">
        <h1 class="column-xs main-xs-center">Global Views On Artificial Intelligence</h1>
        <a href="#main" class="down-arr">&#8595;</a>
        <img class="full-image" src="Assets/Iberian_Peninsula_at_Night_-_NASA_Earth_Observatory.jpg" alt="">
    </header>

    <main id="main">
        <!-- Cleaned up Tableau HTML code for Choropleth Map from Tableau Public -->
        <section class="viz-section">
            <div class="viz-container">
                <div class='tableauPlaceholder' id='viz1776644257337'>
                    <noscript><a href='#'><img alt='Trust in Other Countries AI Regulation' src='https://public.tableau.com/static/images/Ch/ChoroplethMapProject/Map/1_rss.png' style='border: none' /></a></noscript>
                    <object class='tableauViz' style='display:none;'>
                        <param name='host_url' value='https%3A%2F%2Fpublic.tableau.com%2F' />
                        <param name='embed_code_version' value='3' />
                        <param name='site_root' value='' />
                        <param name='name' value='ChoroplethMapProject/Map' />
                        <param name='tabs' value='no' />
                        <param name='toolbar' value='yes' />
                        <param name='static_image' value='https://public.tableau.com/static/images/Ch/ChoroplethMapProject/Map/1.png' />
                        <param name='animate_transition' value='yes' />
                        <param name='display_static_image' value='yes' />
                        <param name='display_spinner' value='yes' />
                        <param name='display_overlay' value='yes' />
                        <param name='display_count' value='yes' />
                        <param name='language' value='en-US' />
                        <param name='filter' value='publish=yes' />
                    </object>
                </div>
                <script type='text/javascript'>
                    var divElement = document.getElementById('viz1776644257337');
                    var vizElement = divElement.getElementsByTagName('object')[0];
                    vizElement.style.width = '100%';
                    vizElement.style.height = (divElement.offsetWidth * 0.75) + 'px';
                    var scriptElement = document.createElement('script');
                    scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
                    vizElement.parentNode.insertBefore(scriptElement, vizElement);
                </script>
            </div>
        </section>

        <section class="viz-section">
            <div class="viz-container">
                <iframe src="Assets/ai_optimism_scatterplot.html" title="AI Optimism Scatterplot"></iframe>
            </div>
        </section>

        <section class="viz-section">
            <div class="viz-container">
                <iframe src="Assets/prj_subplots.html" title="Project Subplots"></iframe>
            </div>
        </section>

    </main>

    <footer>
        <p class="navhelper">
            View the original report <a href="https://hai.stanford.edu/ai-index/2023-ai-index-report/public-opinion">HERE</a>
        </p>
        <address>Created by Brennen Card, Eli Ethington, and Jack Zamary | Hero section courtesy of <a href="https://www.sliderrevolution.com/resources/css-header/">Slider Revolution</a></address>
    </footer>

</div>

<!-- JavaScript for the visualizations -->
<!-- sourced from https://www.sliderrevolution.com/resources/css-header/ -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
<script>
$(document.body).on('click', 'a[href*="#"]', function(e) {
    e.preventDefault();
    $('html,body').animate({
        scrollTop: $(this.hash).offset().top
    }, 900);
});

$(window).on('scroll', function() {
    var scrolled = $(window).scrollTop();
    var height = $(window).height();
    if (scrolled < height) {
        $('.full-image').css({
            'top': -scrolled * .5
        });
    }
});

// Set the height of the iframe to the height of the content
// Each visualization will now fit to the content of the iframe

document.querySelectorAll('.viz-container iframe').forEach(function(iframe) {
    iframe.addEventListener('load', function() {
        try {
            iframe.style.height = iframe.contentDocument.body.scrollHeight + 'px';
        } catch (e) {
            iframe.style.height = '620px';
        }
    });
});
</script>

</body>
</html>
